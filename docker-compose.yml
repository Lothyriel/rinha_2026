x-api-template: &api-template
  image: ghcr.io/lothyriel/rinha_2026:v0.1.1
  platform: linux/amd64
  volumes:
    - sockets:/sockets
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "curl --unix-socket $$RINHA_UNIX_SOCKET_PATH -f http://localhost/ready",
      ]
    interval: 10s
    timeout: 3s
    retries: 10
    start_period: 20s
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: "0.40"
        memory: 150MB

services:
  api-1:
    <<: *api-template
    environment:
      RINHA_RESOURCES_DIR: /app/resources
      RINHA_SEARCH_BACKEND: hnsw
      RINHA_UNIX_SOCKET_PATH: /sockets/api-1.sock
      RINHA_HNSW_EF_SEARCH: 2
      RINHA_HNSW_EF_CONSTRUCTION: 200

  api-2:
    <<: *api-template
    environment:
      RINHA_RESOURCES_DIR: /app/resources
      RINHA_SEARCH_BACKEND: hnsw
      RINHA_UNIX_SOCKET_PATH: /sockets/api-2.sock
      RINHA_HNSW_EF_SEARCH: 2
      RINHA_HNSW_EF_CONSTRUCTION: 200

  load-balancer:
    image: nginx:1.30-alpine
    platform: linux/amd64
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9999/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 50MB

volumes:
  sockets:
