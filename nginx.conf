worker_processes 1;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    access_log off;

    upstream fraud_api {
        server unix:/sockets/api-1.sock;
        server unix:/sockets/api-2.sock;
        keepalive 64;
    }

    server {
        listen 9999;

        location / {
            proxy_pass http://fraud_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
